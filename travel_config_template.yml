# ✈️ AI 旅遊規劃系統設定檔範本 (travel_config_template.yml)
# 使用方法：請複製此檔案並命名為 `travel_config.yml`，然後依據您的實際旅程修改內容。

# 行程路線（必填，至少要能看出目的地！留空或無法辨識目的地時，Agent 會停止規劃並請您補上）：
# 用一段自然語言描述出發地、出發機場（含航廈）、目的地、抵達機場（含航廈）、去回程航空公司即可，不用分開填欄位。
# 若省略機場航廈或航空公司等細節，Agent 會自動查詢當前最常用/合理的選項並在規劃書中註明推論依據。
trip_route: |
  從台灣桃園國際機場 (TPE) T1 出發，前往日本東京成田國際機場 (NRT) T2。
  搭乘星宇航空 (STARLUX Airlines)。

# 旅遊日期（必填，請用明確日期 YYYY-MM-DD，避免自然語言日期造成誤判）
travel_dates:
  start_date: "2026-10-15"
  end_date: "2026-10-19"

# 檢索限定年份（選填）：限定 Agent 查詢資訊時鎖定哪一年的最新規定/票價/匯率。
# 留空時自動推導自上方 travel_dates 涵蓋的年份（跨年行程則兩個年份都納入檢索）；
# 若旅遊日期橫跨年底年初、或想額外查詢隔年新制，可在此明確覆寫。
target_year: ""

# 通訊與語言偏好
telecom_carrier: "中華電信"               # 選填；留空則只比較當地 eSIM/SIM/WiFi 通用方案，不做電信商漫遊比較
language: "繁體中文 (zh-TW)"              # 最終產出的規劃書語言

# 規劃書寫作與排版風格偏好 (如: 溫馨體貼、幽默風趣、極簡條列、專業詳細，資深編輯將依此修飾第二個 travel_{目的地}_edited.md)
tone_style: "溫馨體貼，文字富有溫度，適合與長輩共同導讀與分享"

# 同伴資訊（選填，一段自然語言描述人數、年齡、關係即可，例如：帶 2 歲幼兒需要嬰兒車、長輩同行需電梯優先等）。
# 留空時 Agent 會以「一般成人旅客」為假設進行規劃，仍會產出同伴友善度評分，但不會有特殊防雷加權。
companions: |
  3 人的家庭旅遊，其中包含 1 位 2 歲幼兒，需要推嬰兒車、電梯優先。

# 特殊交代與個人偏好 (請以 YAML 多行文字 '|' 自由撰寫，Notes 內容對 Agent 具最高覆寫權限)
preferences:
  hotel: "上野雷索爾飯店 (Hotel Resol Ueno)"
  # 美食偏好（選填）：辣度、想吃品類、忌口都可自由寫成一段話，例如：
  #   喜歡拉麵與炸物；不能吃辣；忌口海鮮；想安排一次道地居酒屋體驗。
  # 留空時 Agent 會自動啟動「多元美食自主蒐集」，橫跨正餐名店/在地小吃/
  # 咖啡廳甜點/伴手禮特產等類別，適合不熟該國飲食的旅客參考。
  food_preferences: ""
  notes: |
    【填寫範例 - 請依實際需求增減】
    1. 同伴與步調：我們有帶 2 歲的幼兒，需要推嬰兒車。每日行程步調需極度緩慢，景點與地鐵移動必須「電梯優先」，並避開需要長距離步行的陡坡與長樓梯。
    2. 指名必去景點與美食（重要）：這一次我們指名要去「東京迪士尼樂園」、「淺草寺」與吃「利久牛舌」。請 Agent 務必以這三個地標為核心去串聯與規劃行程，並幫忙規劃周邊無障礙的歇腳處（如特色親子咖啡廳）與接駁交通。
    3. 交通接駁偏好：從成田機場到上野，優先推薦 Skyliner 機場快線。市區內移動以地鐵為主，若地鐵無障礙設施不便，請加註推薦計程車。
    4. 支付方式偏好：主要使用信用卡與 Apple Pay，想知道 Suica (西瓜卡) 目前在當地的最新綁定與儲值規定。
    5. 保險要求：需要投保海外突發疾病醫療險，且因為有在東京近郊自駕的打算，需要說明海外租車保險（CDW/NOC）的理賠防坑注意。
    6. 網頁搜尋來源偏好：
       - (A) 官方規定：入境快速通關（如 Visit Japan Web）與免稅規定，由 Agent 自主搜尋對應的日本官方網站最新公告。
       - (B) 遊記與美食：偏好搜尋「台灣知名旅遊部落客（如：樂活的大方、波比看世界、Alina愛琳娜）」與「背包客棧」、「Klook / KKday 攻略」的最新繁體中文食記，以利篩選出符合台灣人口味的餐廳與帶嬰兒車的避雷經驗。
